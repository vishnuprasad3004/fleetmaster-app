name: fleetmaster
description: Fleet Management Platform for Transport Businesses
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^11.0.0

  # HTTP & API
  dio: ^5.3.0
  retrofit: ^4.1.0

  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # UI & Fonts
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  get_it: ^7.6.0
  
  # Validation
  email_validator: ^2.1.17

  # WebSocket for real-time features
  web_socket_channel: ^2.4.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  retrofit_generator: ^7.0.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
