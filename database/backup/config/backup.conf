# PostgreSQL Backup Configuration
# FleetMaster Production Backup System

# ============================================
# Database Connection Settings
# ============================================
DB_HOST="${DB_HOST:-postgres}"
DB_PORT="${DB_PORT:-5432}"
DB_NAME="${DB_NAME:-fleetmaster_db}"
DB_USER="${DB_USER:-postgres}"
DB_PASSWORD="${DB_PASSWORD:-postgres}"

# ============================================
# Backup Storage Settings
# ============================================
# Local backup directory
BACKUP_DIR="/backups/postgresql"

# Remote backup storage (S3, GCS, or custom)
REMOTE_BACKUP_ENABLED="${REMOTE_BACKUP_ENABLED:-false}"
REMOTE_BACKUP_TYPE="${REMOTE_BACKUP_TYPE:-s3}"  # s3, gcs, sftp
S3_BUCKET="${S3_BUCKET:-fleetmaster-backups}"
S3_REGION="${S3_REGION:-ap-south-1}"
S3_PREFIX="${S3_PREFIX:-postgresql}"

# ============================================
# Backup Schedule & Retention
# ============================================
# Daily backup time (24h format)
BACKUP_TIME="02:00"

# Retention policy (days)
RETENTION_DAILY=7        # Keep daily backups for 7 days
RETENTION_WEEKLY=30      # Keep weekly backups for 30 days
RETENTION_MONTHLY=90     # Keep monthly backups for 90 days
RETENTION_YEARLY=365     # Keep yearly backups for 1 year

# ============================================
# Backup Settings
# ============================================
# Compression type: gzip, lz4, zstd, none
COMPRESSION="${COMPRESSION:-gzip}"
COMPRESSION_LEVEL="${COMPRESSION_LEVEL:-6}"

# Enable parallel backup (PostgreSQL 10+)
PARALLEL_JOBS="${PARALLEL_JOBS:-4}"

# Backup format: custom, tar, plain
BACKUP_FORMAT="${BACKUP_FORMAT:-custom}"

# Include large objects
INCLUDE_LARGE_OBJECTS="${INCLUDE_LARGE_OBJECTS:-true}"

# ============================================
# Restore Testing Settings
# ============================================
# Enable automatic restore testing
RESTORE_TEST_ENABLED="${RESTORE_TEST_ENABLED:-true}"
RESTORE_TEST_DATABASE="${RESTORE_TEST_DATABASE:-fleetmaster_test}"
RESTORE_TEST_SCHEDULE="${RESTORE_TEST_SCHEDULE:-weekly}"  # daily, weekly, monthly
RESTORE_TEST_RETENTION_DAYS="${RESTORE_TEST_RETENTION_DAYS:-1}"

# ============================================
# Monitoring & Notifications
# ============================================
# Health check endpoint
HEALTH_CHECK_ENABLED="${HEALTH_CHECK_ENABLED:-true}"
HEALTH_CHECK_PORT="${HEALTH_CHECK_PORT:-9090}"

# Notification settings
NOTIFICATION_ENABLED="${NOTIFICATION_ENABLED:-false}"
NOTIFICATION_TYPE="${NOTIFICATION_TYPE:-slack}"  # slack, email, webhook
SLACK_WEBHOOK_URL="${SLACK_WEBHOOK_URL:-}"
EMAIL_RECIPIENTS="${EMAIL_RECIPIENTS:-admin@fleetmaster.com}"

# Alert thresholds
BACKUP_SIZE_WARNING_MB="${BACKUP_SIZE_WARNING_MB:-1024}"
BACKUP_SIZE_CRITICAL_MB="${BACKUP_SIZE_CRITICAL_MB:-2048}"
BACKUP_DURATION_WARNING_SECONDS="${BACKUP_DURATION_WARNING_SECONDS:-3600}"

# ============================================
# Security Settings
# ============================================
# Encrypt backups
ENCRYPTION_ENABLED="${ENCRYPTION_ENABLED:-false}"
ENCRYPTION_ALGORITHM="${ENCRYPTION_ALGORITHM:-aes-256-cbc}"
ENCRYPTION_KEY_FILE="${ENCRYPTION_KEY_FILE:-/etc/fleetmaster/backup.key}"

# ============================================
# Performance Settings
# ============================================
# Backup timeout (seconds)
BACKUP_TIMEOUT="${BACKUP_TIMEOUT:-7200}"

# Memory limit for operations (MB)
MEMORY_LIMIT_MB="${MEMORY_LIMIT_MB:-1024}"

# I/O nice level (0-19, higher = lower priority)
IONICE_LEVEL="${IONICE_LEVEL:-7}"

# ============================================
# Logging Settings
# ============================================
LOG_LEVEL="${LOG_LEVEL:-INFO}"
LOG_DIR="${LOG_DIR:-/var/log/postgresql-backup}"
LOG_RETENTION_DAYS="${LOG_RETENTION_DAYS:-30}"
